<DirectoryMatch "^${DOC}/data/upload">
  <FilesMatch "\.php$">
    SetHandler None"
  </FilesMatch>
</DirectoryMatch>
<Directory "${DOC}/*/*">
  AllowOverride None
  AllowOverrideList None
</Directory>
<Directory "${DOC}">
  ## General stuff ##
  Options -Indexes
  DirectoryIndex index.php

  ## Compression ##
  <IfModule mod_deflate.c>
    AddOutputFilterByType DEFLATE text/html
  </IfModule>

  ## Rewrite rules ##
  RewriteEngine On

  # Proxy websockets
  RewriteCond %{HTTP:Sec-WebSocket-Version} 13 [NC]
  RewriteRule ^/?(.*) "ws://rabbitmq:15674/ws" [P,L]

  # Proxy client app
  RewriteCond %{REQUEST_FILENAME} !-f
  RewriteCond %{REQUEST_FILENAME} resources|classic
  RewriteRule .* %{ENV:VDR}/client%{REQUEST_URI} [L]
  RewriteRule ^admin(.*) %{ENV:VDR}/client$1 [L]

  # Proxy 3rd-party resources
  RewriteCond %{REQUEST_FILENAME} !-f
  RewriteCond %{REQUEST_URI} admin/vendor
  RewriteRule ^admin/(.*) $1 [L]

  RewriteCond %{REQUEST_FILENAME} !-f
  RewriteRule .* index.php [L]
</Directory>

RedirectMatch 404 \.(ini|git)