services:

  apache:
    build:
      dockerfile: compose/apache/Dockerfile
      args:
        - DOC=${DOC}
        - GH_TOKEN_SYSTEM_RO=${GH_TOKEN_SYSTEM_RO}
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      wrapper:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    environment:
      DOC: ${DOC}
      RABBITMQ_HOST: rabbitmq
      DB_HOST: ${DB_ENGINE}
      DB_USER: ${DB_USER:-custom}
      DB_PASSWORD: ${DB_PASSWORD:-custom}
      DB_NAME: ${DB_NAME:-custom}
      LETS_ENCRYPT_NOTIFY: ${GIT_COMMIT_EMAIL:-}
      APP_ENV: ${APP_ENV}
    working_dir: ${DOC}
    volumes:
      - ./custom/public/:${DOC}/
      - letsencrypt:/etc/letsencrypt
      - opendkim:/etc/opendkim
      - ./compose/opendkim.conf:/etc/opendkim.conf
      - ./compose/apache/ioncube.ini:/usr/local/etc/php/conf.d/00-ioncube.ini
      - ./compose/apache/ioncube.so:/usr/local/lib/php/extensions/ioncube.so
      - ./compose/apache/php.ini:/usr/local/etc/php/conf.d/01-system.ini
      - ./custom/compose/apache/php.ini:/usr/local/etc/php/conf.d/02-custom.ini
      - ./compose/apache/docker-entrypoint.sh:/usr/local/bin/custom-entrypoint.sh:ro
      - ./compose/apache/excel-to-pdf.py:/usr/local/bin/excel-to-pdf.py:ro
      - ./compose/apache/apache2.conf:/etc/apache2/conf-enabled/01-system.conf:ro
      - ./compose/apache/htpasswd.conf:/etc/apache2/conf-available/htpasswd.conf:ro
      - ./compose/apache/crontab:/var/www/crontab:ro
      - ./var/log/compose/apache/:/var/log/apache2
      - ./var/log/custom:/var/log/custom
      - ./var/tmp/:/var/www/tmp

  rabbitmq:
    image: rabbitmq:3.10-management-alpine
    restart: unless-stopped
    volumes:
      - ./compose/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf
      - ./compose/rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins
      - rabbitmq:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics check_port_connectivity
      timeout: 20s
      retries: 10
    command: rabbitmq-server

  wrapper:
    build:
      dockerfile: compose/wrapper/Dockerfile
      args:
        - DOC=${DOC}
    restart: unless-stopped
    environment:
      DOC: ${DOC}
      GIT_COMMIT_NAME: ${GIT_COMMIT_NAME:-}
      GIT_COMMIT_EMAIL: ${GIT_COMMIT_EMAIL:-}
      GH_ASSET_MAX_SIZE: ${GH_ASSET_MAX_SIZE:-}
      DB_USER: ${DB_USER:-custom}
      DB_PASSWORD: ${DB_PASSWORD:-custom}
      DB_NAME: ${DB_NAME:-custom}
      DB_DUMP: ${DB_DUMP}
      DB_HOST: ${DB_ENGINE}
      RABBITMQ_HOST: rabbitmq
      EMAIL_SENDER_DOMAIN: ${EMAIL_SENDER_DOMAIN:-$LETS_ENCRYPT_DOMAIN}
      BACKUPS: ${BACKUPS:-}
      APP_ENV: ${APP_ENV}
      PYTHONUNBUFFERED: 1
    working_dir: ${DOC}
    depends_on:
      mysql:
        condition: service_healthy
        restart: true
    healthcheck:
      test: ["CMD-SHELL", "timeout 1 bash -c '</dev/tcp/localhost/80' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    volumes:
      - ./:${DOC}/
      - opendkim:/etc/opendkim
      - ./compose/opendkim.conf:/etc/opendkim.conf
      - ./var/log/custom:/var/log/custom

volumes:
  rabbitmq:
  letsencrypt:
  opendkim:
